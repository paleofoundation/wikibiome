// ─── POLAR COORDS ───────────────────────────────────────────────────
function polar(index, total, radius, cx, cy) {
  const a = (index / total) * Math.PI * 2 - Math.PI / 2; // start at top
  return { x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) };
}

    .filter(Boolean);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <div style={{ padding: '20px', borderBottom: '1px solid #e5e3df', backgroundColor: '#fafaf8' }}>
        <h2 style={{ margin: '0 0 8px', fontSize: '18px', fontWeight: 600, color: '#1a1a1a', fontFamily: 'Libre Baskerville, serif' }}>
          {hallmark.label}
        </h2>
        <p style={{ margin: 0, fontSize: '12px', color: '#666', lineHeight: '1.5' }}>{hallmark.description}</p>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px' }}>
        {contributingTaxa.length > 0 && (
          <Section title="Contributing Taxa">
            {contributingTaxa.map(t => (
              <div key={t.id} style={{ fontSize: '11px', color: '#666', marginBottom: '4px' }}>
                \u2022 <strong>{t.shortLabel}</strong> — {t.role_summary || t.normal_function}
              </div>
            ))}
          </Section>
        )}
        {contributingMetals.length > 0 && (
          <Section title="Contributing Metals">
            {contributingMetals.map(m => {
              const edge = MATRIX_DATA.edges.metal_to_hallmark.find(e => e.metal === m.id && e.hallmark === hallmark.id);
              return (
                <div key={m.id} style={{ fontSize: '11px', color: '#666', marginBottom: '4px' }}>
                  \u2022 <strong>{m.symbol}</strong> — {m.role.substring(0, 80)}{edge && edge.via ? ` (via ${edge.via})` : ''}
                </div>
              );
            })}
          </Section>
        )}
      </div>
      <CurevaGate title="Ecological Reversal Strategies" desc="Interventions that reverse this hallmark through multi-layer targeting." />
    </div>
  );
}

function Section({ title, children }) {
  return (
    <section style={{ marginBottom: '16px' }}>
      <h3 style={{ fontSize: '11px', fontWeight: 600, color: '#333', margin: '0 0 8px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
        {title}
      </h3>
      {children}
    </section>
  );
}

function CurevaGate({ title, desc }) {
  return (
    <div style={{ padding: '16px', borderTop: '2px solid #b87333', backgroundColor: '#faf6f2', marginTop: 'auto' }}>
      <h3 style={{ fontSize: '11px', fontWeight: 600, color: '#b87333', margin: '0 0 6px', textTransform: 'uppercase' }}>{title}</h3>
      <p style={{ fontSize: '12px', color: '#666', margin: '0 0 10px', lineHeight: '1.4' }}>{desc}</p>
      <button
        style={{
          width: '100%', padding: '10px 12px', backgroundColor: '#0D9488', color: '#fff',
          border: 'none', borderRadius: '6px', fontSize: '12px', fontWeight: 600, cursor: 'pointer'
        }}
        onMouseEnter={(ev) => ev.target.style.backgroundColor = '#0f7a6e'}
        onMouseLeave={(ev) => ev.target.style.backgroundColor = '#0D9488'}
      >
        View on Cureva.ai \u2192
      </button>
    </div>
  );
}

// ─── MAIN COMPONENT ─────────────────────────────────────────────────
function SignatureExplorer() {
  const [selectedNode, setSelectedNode] = useState(null);
  const [selectedNodeType, setSelectedNodeType] = useState(null);
  const [restrictedMetal, setRestrictedMetal] = useState(null);
  const [showRestrictionEffect, setShowRestrictionEffect] = useState(false);

  // Read query params (?disease=X&node=Y)
  const urlParams = typeof window !== 'undefined' ? new URLSearchParams(window.location.search) : null;
  const diseaseParam = urlParams?.get('disease');
  const nodeParam = urlParams?.get('node');

  // Currently only endometriosis has a matrix; future signatures will load via fetch
  useEffect(() => {
    if (diseaseParam && diseaseParam !== MATRIX_DATA.condition.id) {
      // Future: fetch(`/data/signatures/${diseaseParam}.json`) and setMatrix
      console.warn('Signature not yet available for:', diseaseParam);
    }
    if (nodeParam) {
      const taxon = [...MATRIX_DATA.taxa.enriched, ...MATRIX_DATA.taxa.depleted].find(t => t.id === nodeParam);
      const metal = MATRIX_DATA.metals.find(m => m.id === nodeParam);
      const hallmark = MATRIX_DATA.hallmarks.find(h => h.id === nodeParam);
      if (taxon) { setSelectedNode(nodeParam); setSelectedNodeType('taxon'); }
      else if (metal) { setSelectedNode(nodeParam); setSelectedNodeType('metal'); }
      else if (hallmark) { setSelectedNode(nodeParam); setSelectedNodeType('hallmark'); }
    }
  }, []);

  const svgW = 960;
  const svgH = 760;
  const cx = svgW / 2;
  const cy = svgH / 2;

  const R_SHIELD = 70;
  const R_HALLMARK = 165;
  const R_METAL = 245;
  const R_TAXON = 330;

  const enrichedTaxa = MATRIX_DATA.taxa.enriched;
  const depletedTaxa = MATRIX_DATA.taxa.depleted;
  const allTaxa = [...enrichedTaxa, ...depletedTaxa];
  const hallmarks = MATRIX_DATA.hallmarks;
  const metals = MATRIX_DATA.metals;
  const shields = MATRIX_DATA.nutritional_immunity;

  // Position maps
  const taxonPos = useMemo(() => {
    const p = {};
    allTaxa.forEach((t, i) => { p[t.id] = polar(i, allTaxa.length, R_TAXON, cx, cy); });
    return p;
  }, []);

  const hallmarkPos = useMemo(() => {
    const p = {};
    hallmarks.forEach((h, i) => { p[h.id] = polar(i, hallmarks.length, R_HALLMARK, cx, cy); });
    return p;
  }, []);

  const metalPos = useMemo(() => {
    const p = {};
    metals.forEach((m, i) => { p[m.id] = polar(i, metals.length, R_METAL, cx, cy); });
    return p;
  }, []);

  const shieldPos = useMemo(() => {
    const p = {};
    shields.forEach((s, i) => { p[s.id] = polar(i, shields.length, R_SHIELD, cx, cy); });
    return p;
  }, []);

  // Selection helpers
  const select = (id, type) => {
    setSelectedNode(id);
    setSelectedNodeType(type);
    setRestrictedMetal(null);
    setShowRestrictionEffect(false);
  };

  const isVisible = useCallback((src, tgt, edgeType) => {
    if (!selectedNode) return false;
    if (selectedNodeType === 'taxon') return src === selectedNode || tgt === selectedNode;
    if (selectedNodeType === 'metal') {
      if (edgeType === 'taxon_to_metal') return tgt === selectedNode;
      if (edgeType === 'metal_to_hallmark') return src === selectedNode;
    }
    if (selectedNodeType === 'hallmark') {
      if (edgeType === 'taxon_to_hallmark') return tgt === selectedNode;
      if (edgeType === 'metal_to_hallmark') return tgt === selectedNode;
    }
    return false;
  }, [selectedNode, selectedNodeType]);

  const isFaded = useCallback((nodeId, type) => {
    if (!selectedNode) return false;
    if (selectedNode === nodeId) return false;

    if (selectedNodeType === 'taxon' && type === 'taxon') return true;
    if (selectedNodeType === 'metal' && type === 'taxon') {
      const connected = MATRIX_DATA.edges.taxon_to_metal.filter(e => e.metal === selectedNode).map(e => e.taxon);
      return !connected.includes(nodeId);
    }
    if (selectedNodeType === 'hallmark' && type === 'taxon') {
      const connected = MATRIX_DATA.edges.taxon_to_hallmark.filter(e => e.hallmark === selectedNode).map(e => e.taxon);
      return !connected.includes(nodeId);
    }
    if (selectedNodeType === 'metal' && type === 'metal') return true;
    if (selectedNodeType === 'hallmark' && type === 'hallmark') return true;
    return false;
  }, [selectedNode, selectedNodeType]);

  // Get selected details
  const selTaxon = selectedNodeType === 'taxon' ? allTaxa.find(t => t.id === selectedNode) : null;
  const selMetal = selectedNodeType === 'metal' ? metals.find(m => m.id === selectedNode) : null;
  const selHallmark = selectedNodeType === 'hallmark' ? hallmarks.find(h => h.id === selectedNode) : null;

  // Ring label helper
  function ringLabel(text, radius, angle) {
    const lx = cx + (radius + 16) * Math.cos(angle);
    const ly = cy + (radius + 16) * Math.sin(angle);
    return <text x={lx} y={ly} textAnchor="middle" fontSize="9" fill="#bbb" fontFamily="Inter, sans-serif" fontWeight="500" style={{textTransform:'uppercase', letterSpacing:'1px'}}>{text}</text>;
  }

  return (
    <div style={{ width: '100%', height: '100vh', backgroundColor: '#fafaf8', fontFamily: 'Inter, system-ui, sans-serif', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '16px 24px', borderBottom: '1px solid #e5e3df', backgroundColor: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <h1 style={{ margin: '0 0 4px', fontSize: '24px', fontWeight: 600, color: '#1a1a1a', fontFamily: 'Libre Baskerville, serif' }}>
            {MATRIX_DATA.condition.label} Signature Explorer
          </h1>
          <p style={{ margin: 0, fontSize: '13px', color: '#888' }}>
            Interactive ecosystem map from {MATRIX_DATA.condition.paper_count} peer-reviewed sources &middot; <a href="/" style={{color:'#b87333', fontWeight:500, textDecoration:'none'}}>WikiBiome</a>
          </p>
        </div>
        <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
          <LegendDot color="#8b2020" label="Enriched" />
          <LegendDot color="#4a6fa5" label="Depleted" />
          <LegendDot color="#a08b6b" label="Paradoxical" />
          <span style={{ fontSize: '10px', color: '#aaa', marginLeft: '8px' }}>\u25B2 Metal &nbsp; \u25CF Taxon &nbsp; \u25A0 Hallmark</span>
        </div>
      </div>

      {/* Main area */}
      <div className="explorer-main" style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* SVG */}
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px', minWidth: 0 }}>
          <svg viewBox={`0 0 ${svgW} ${svgH}`} preserveAspectRatio="xMidYMid meet" style={{ width: '100%', height: '100%', maxWidth: svgW, maxHeight: svgH, backgroundColor: '#fff', borderRadius: '12px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
            <defs>
              <linearGradient id="paradoxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#8b2020" />
                <stop offset="100%" stopColor="#4a6fa5" />
              </linearGradient>
            </defs>

            {/* Guide circles */}
            <circle cx={cx} cy={cy} r={R_TAXON + 20} fill="none" stroke="#e5e3df" strokeWidth="0.5" opacity="0.4" />
            <circle cx={cx} cy={cy} r={R_METAL + 8} fill="none" stroke="#e5e3df" strokeWidth="0.5" opacity="0.3" strokeDasharray="4,4" />
            <circle cx={cx} cy={cy} r={R_HALLMARK + 8} fill="none" stroke="#e5e3df" strokeWidth="0.5" opacity="0.3" />
            <circle cx={cx} cy={cy} r={R_SHIELD + 8} fill="none" stroke="#0D9488" strokeWidth="0.5" opacity="0.15" />

            {/* Ring labels */}
            {ringLabel("TAXA", R_TAXON, -Math.PI/2 + 0.25)}
            {ringLabel("METALS", R_METAL, -Math.PI/2 + 0.20)}
            {ringLabel("HALLMARKS", R_HALLMARK, -Math.PI/2 + 0.28)}

            {/* ── EDGES: default faint ── */}
            {!selectedNode && (
              <g>
                {MATRIX_DATA.edges.taxon_to_metal.map((e, i) => {
                  const s = taxonPos[e.taxon], t = metalPos[e.metal];
                  if (!s || !t) return null;
                  return <line key={`tm${i}`} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="#c9917a" strokeWidth={1} opacity={0.08} />;
                })}
                {MATRIX_DATA.edges.taxon_to_hallmark.map((e, i) => {
                  const s = taxonPos[e.taxon], t = hallmarkPos[e.hallmark];
                  if (!s || !t) return null;
                  return <line key={`th${i}`} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="#0D9488" strokeWidth={1} opacity={0.06} />;
                })}
                {MATRIX_DATA.edges.metal_to_hallmark.map((e, i) => {
                  const s = metalPos[e.metal], t = hallmarkPos[e.hallmark];
                  if (!s || !t) return null;
                  return <line key={`mh${i}`} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="#a0714f" strokeWidth={1} opacity={0.06} />;
                })}
              </g>
            )}

            {/* ── EDGES: selected ── */}
            {selectedNode && (
              <g>
                {MATRIX_DATA.edges.taxon_to_metal.filter(e => isVisible(e.taxon, e.metal, 'taxon_to_metal')).map((e, i) => {
                  const s = taxonPos[e.taxon], t = metalPos[e.metal];
                  if (!s || !t) return null;
                  const restr = restrictedMetal === e.metal;
                  return <line key={`vs-tm${i}`} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="#c9917a" strokeWidth={1.5 + 2 * e.evidence_weight} opacity={restr ? 0.25 : 0.7} style={{transition:'opacity 400ms'}} />;
                })}
                {MATRIX_DATA.edges.taxon_to_hallmark.filter(e => isVisible(e.taxon, e.hallmark, 'taxon_to_hallmark')).map((e, i) => {
                  const s = taxonPos[e.taxon], t = hallmarkPos[e.hallmark];
                  if (!s || !t) return null;
                  return <line key={`vs-th${i}`} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="#0D9488" strokeWidth={1.5 + 2 * e.evidence_weight} opacity={0.6} style={{transition:'opacity 400ms'}} />;
                })}
                {MATRIX_DATA.edges.metal_to_hallmark.filter(e => isVisible(e.metal, e.hallmark, 'metal_to_hallmark')).map((e, i) => {
                  const s = metalPos[e.metal], t = hallmarkPos[e.hallmark];
                  if (!s || !t) return null;
                  return <line key={`vs-mh${i}`} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="#a0714f" strokeWidth={1.5 + 2 * e.evidence_weight} opacity={0.6} style={{transition:'opacity 400ms'}} />;
                })}
              </g>
            )}

            {/* ── CENTER ── */}
            <circle cx={cx} cy={cy} r={52} fill="#fff" stroke="#b87333" strokeWidth="2" />
            <text x={cx} y={cy - 6} textAnchor="middle" fontSize="16" fontWeight="600" fill="#1a1a1a" fontFamily="Libre Baskerville, serif">Endometriosis</text>
            <text x={cx} y={cy + 14} textAnchor="middle" fontSize="11" fill="#999" fontFamily="Inter, sans-serif">28 papers</text>

            {/* ── SHIELD RING ── */}
            {shields.map((s) => {
              const p = shieldPos[s.id];
              if (!p) return null;
              const c = s.status === 'elevated' ? '#0D9488' : '#c44040';
              return (
                <g key={`sh-${s.id}`}>
                  <circle cx={p.x} cy={p.y} r={10} fill={c} opacity={0.6} />
                  <text x={p.x} y={p.y - 16} textAnchor="middle" fontSize="9" fill="#999" fontFamily="Inter, sans-serif">{s.label.length > 12 ? s.label.substring(0,10)+'...' : s.label}</text>
                </g>
              );
            })}

            {/* ── HALLMARK RING ── */}
            {hallmarks.map((h) => {
              const p = hallmarkPos[h.id];
              if (!p) return null;
              const sel = selectedNode === h.id && selectedNodeType === 'hallmark';
              const faded = isFaded(h.id, 'hallmark');
              const op = sel ? 1 : faded ? 0.15 : 0.7;
              const labelText = h.label.length > 14 ? h.label.substring(0, 12) + '..' : h.label;
              const boxW = Math.max(labelText.length * 6 + 16, 50);
              return (
                <g key={`hm-${h.id}`} onClick={() => select(h.id, 'hallmark')} style={{ cursor: 'pointer' }}>
                  <rect x={p.x - boxW/2} y={p.y - 11} width={boxW} height={22} rx={4}
                    fill={sel ? '#a0714f' : '#e5d4c1'} stroke={sel ? '#b87333' : 'none'} strokeWidth="1.5"
                    opacity={op} style={{transition:'opacity 300ms'}} />
                  <text x={p.x} y={p.y + 4} textAnchor="middle" fontSize="10" fontWeight="500"
                    fill={sel ? '#fff' : '#555'} fontFamily="Inter, sans-serif" opacity={op} style={{transition:'opacity 300ms'}}>
                    {labelText}
                  </text>
                </g>
              );
            })}

            {/* ── METAL RING ── */}
            {metals.map((m) => {
              const p = metalPos[m.id];
              if (!p) return null;
              const sel = selectedNode === m.id && selectedNodeType === 'metal';
              const faded = isFaded(m.id, 'metal');
              const sz = 7 + m.evidence_weight * 10;
              const c = m.status === 'elevated' ? '#c9917a' : '#c44040';
              const op = sel ? 1 : faded ? 0.15 : 0.7;
              const restr = restrictedMetal === m.id;
              return (
                <g key={`mt-${m.id}`} onClick={() => select(m.id, 'metal')} style={{ cursor: 'pointer' }}>
                  <polygon
                    points={`${p.x},${p.y - sz} ${p.x + sz},${p.y + sz/2} ${p.x - sz},${p.y + sz/2}`}
                    fill={c} opacity={op} style={{ transition: 'opacity 300ms', filter: restr ? 'brightness(0.5) saturate(0.3)' : 'none' }}
                  />
                  {restr && <line x1={p.x - sz - 2} y1={p.y + sz/2 + 2} x2={p.x + sz + 2} y2={p.y - sz - 2} stroke="#333" strokeWidth="2" opacity="0.5" />}
                  <text x={p.x} y={p.y + sz + 18} textAnchor="middle" fontSize="12" fontWeight="600" fill={sel ? '#333' : '#666'} fontFamily="Inter, sans-serif" opacity={op} style={{transition:'opacity 300ms'}}>
                    {m.symbol}
                  </text>
                  <text x={p.x} y={p.y + sz + 31} textAnchor="middle" fontSize="9" fill="#999" fontFamily="Inter, sans-serif" opacity={op * 0.8}>
                    {m.evidence_label}
                  </text>
                </g>
              );
            })}

            {/* ── TAXA RING ── */}
            {allTaxa.map((t) => {
              const p = taxonPos[t.id];
              if (!p) return null;
              const sel = selectedNode === t.id && selectedNodeType === 'taxon';
              const faded = isFaded(t.id, 'taxon');
              const enzymes = t.enzymes_expressed || [];
              const sz = 16 + (enzymes.length / 6) * 10;
              let fill = '#8b2020';
              let stroke = '#c44040';
              if (t.status === 'depleted') { fill = '#4a6fa5'; stroke = '#6b8fc9'; }
              else if (t.status === 'paradoxical') { fill = 'url(#paradoxGrad)'; stroke = '#a08b6b'; }
              const isDepleted = t.status === 'depleted';
              // Ghost depleted taxa by default: lower base opacity, dashed ring
              const baseOp = isDepleted ? 0.4 : 0.75;
              const op = sel ? 1 : faded ? 0.15 : baseOp;
              const restrDisabled = showRestrictionEffect && restrictedMetal && (t.metal_dependencies || []).includes(restrictedMetal);
              return (
                <g key={`tx-${t.id}`} onClick={() => select(t.id, 'taxon')} style={{ cursor: 'pointer' }}>
                  <circle cx={p.x} cy={p.y} r={sz} fill={isDepleted ? '#fff' : fill} stroke={stroke} strokeWidth="2"
                    strokeDasharray={isDepleted ? '4,3' : undefined}
                    opacity={op} style={{ transition: 'opacity 300ms, filter 400ms', filter: restrDisabled ? 'brightness(0.4) saturate(0.2)' : 'none' }} />
                  {isDepleted && <text x={p.x} y={p.y + 4} textAnchor="middle" fontSize="14" fill={stroke} opacity={op} fontWeight="300">\u2205</text>}
                  {sel && <circle cx={p.x} cy={p.y} r={sz + 4} fill="none" stroke="#b87333" strokeWidth="2" opacity="0.6" />}
                  <text x={p.x} y={p.y + sz + 20} textAnchor="middle" fontSize="11" fontWeight="500"
                    fill={sel ? '#333' : '#666'} fontFamily="Inter, sans-serif" opacity={op} style={{transition:'opacity 300ms'}}>
                    {t.shortLabel}
                  </text>
                  {t.status === 'paradoxical' && (
                    <text x={p.x} y={p.y + sz + 33} textAnchor="middle" fontSize="9" fill="#a08b6b" fontFamily="Inter, sans-serif" opacity={op * 0.8}>
                      (paradoxical)
                    </text>
                  )}
                  {t.status === 'depleted' && (
                    <text x={p.x} y={p.y + sz + 33} textAnchor="middle" fontSize="9" fill="#4a6fa5" fontFamily="Inter, sans-serif" opacity={op * 0.7}>
                      depleted
                    </text>
                  )}
                </g>
              );
            })}
          </svg>
        </div>

        {/* ── SIDEBAR ── */}
        <div className="explorer-sidebar" style={{ width: '380px', minWidth: '380px', backgroundColor: '#fff', borderLeft: '1px solid #e5e3df', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {selTaxon ? (
            <SidebarTaxon taxon={selTaxon} metals={metals} />
          ) : selMetal ? (
            <SidebarMetal metal={selMetal} taxa={allTaxa} restrictedMetal={restrictedMetal} setRestrictedMetal={setRestrictedMetal} showRestrictionEffect={showRestrictionEffect} setShowRestrictionEffect={setShowRestrictionEffect} />
          ) : selHallmark ? (
            <SidebarHallmark hallmark={selHallmark} taxa={allTaxa} metals={metals} />
          ) : (
            <SidebarDefault />
          )}
        </div>
      </div>
    </div>
  );
}

function LegendDot({ color, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
      <div style={{ width: 8, height: 8, borderRadius: '50%', backgroundColor: color }} />
      <span style={{ fontSize: '11px', color: '#888' }}>{label}</span>
    </div>
  );
}

// ─── RENDER ─────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SignatureExplorer />);
  </script>
</body>
</html>
